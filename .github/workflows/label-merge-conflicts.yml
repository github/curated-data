name: "Check for conflicts"

permissions:
  contents: read

on:
  push:
    branches:
      - main
  # TODO(supply-chain-security): Human review: this workflow uses pull_request_target; keep permissions minimal and do not check out or run untrusted PR code here.
  pull_request_target:


jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: check if PRs have conflicts
        uses: eps1lon/actions-label-merge-conflict@fd1f295ee7443d13745804bc49fe158e240f6c6e
        with:
          dirtyLabel: "merge conflict"
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          commentOnClean: |
            @${{github.actor}}
            Conflicts have been resolved. :thumbsup:
